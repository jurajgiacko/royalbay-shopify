<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Bay — Shopify Category & SEO Planner</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #232733; --border: #2e3344;
    --text: #e4e6ef; --text-muted: #8b8fa3;
    --accent: #6c8cff; --accent2: #4ecdc4;
    --green: #4ade80; --orange: #fb923c; --red: #f87171;
    --purple: #a78bfa; --pink: #f472b6; --yellow: #fbbf24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  header h1 { font-size:18px; font-weight:600; }
  header h1 span { color:var(--accent); }
  .header-actions { display:flex; gap:8px; }
  .header-actions button { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; font-size:13px; transition:all .15s; }
  .header-actions button:hover { border-color:var(--accent); color:var(--accent); }
  .header-actions button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }

  .stats-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 24px; display:flex; gap:24px; font-size:13px; color:var(--text-muted); }
  .stats-bar b { color:var(--text); margin-right:4px; }

  .layout { display:grid; grid-template-columns:330px 1fr; height:calc(100vh - 100px); }

  /* Sidebar */
  .sidebar { background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:16px; }
  .sidebar h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:10px; }
  .cat-group { margin-bottom:12px; }
  .cat-group-title { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); margin-bottom:4px; padding:4px 0; border-bottom:1px solid var(--border); }
  .cat-item { padding:5px 10px; border-radius:6px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:space-between; transition:background .15s; margin-bottom:1px; user-select:none; }
  .cat-item:hover { background:var(--surface2); }
  .cat-item.active { background:var(--accent); color:#fff; }
  .cat-item .count { background:var(--surface2); padding:1px 7px; border-radius:10px; font-size:11px; color:var(--text-muted); min-width:22px; text-align:center; }
  .cat-item.active .count { background:rgba(255,255,255,.2); color:#fff; }
  .cat-icon { margin-right:6px; font-size:13px; }
  .cat-seo { font-size:10px; color:var(--text-muted); padding:2px 10px 0 28px; display:none; }
  .cat-item.active + .cat-seo { display:block; }

  .drop-zone { border:2px dashed var(--border); border-radius:8px; padding:10px; margin-top:14px; text-align:center; color:var(--text-muted); font-size:12px; transition:all .2s; }
  .drop-zone.over { border-color:var(--accent); background:rgba(108,140,255,.1); color:var(--accent); }

  /* Main */
  .main { overflow-y:auto; padding:20px; }

  .tabs { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; }
  .tab { padding:7px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; font-size:13px; transition:all .15s; user-select:none; }
  .tab:hover { color:var(--text); }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  .view-controls { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .search-box { flex:1; min-width:200px; padding:8px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; outline:none; }
  .search-box:focus { border-color:var(--accent); }
  .filter-btn { padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; font-size:12px; transition:all .15s; user-select:none; }
  .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(108,140,255,.1); }

  /* Product Cards */
  .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:12px; }
  .product-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; cursor:grab; transition:all .2s; position:relative; }
  .product-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .product-card.dragging { opacity:.5; }
  .product-line { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; margin-bottom:4px; margin-right:3px; }
  .line-energy { background:rgba(108,140,255,.15); color:var(--accent); }
  .line-air { background:rgba(78,205,196,.15); color:var(--accent2); }
  .line-extreme { background:rgba(248,113,113,.15); color:var(--red); }
  .line-extreme-race { background:rgba(251,146,60,.15); color:var(--orange); }
  .line-therapy { background:rgba(167,139,250,.15); color:var(--purple); }
  .line-therapy-premium { background:rgba(167,139,250,.25); color:var(--purple); }
  .line-relax { background:rgba(74,222,128,.15); color:var(--green); }
  .line-motion { background:rgba(244,114,182,.15); color:var(--pink); }
  .line-merino { background:rgba(251,191,36,.15); color:var(--yellow); }
  .line-nrg { background:rgba(251,191,36,.1); color:var(--yellow); }
  .line-ortho { background:rgba(78,205,196,.2); color:var(--accent2); }
  .line-accessories { background:rgba(139,143,163,.2); color:var(--text-muted); }
  .line-bundle { background:rgba(139,143,163,.15); color:var(--text-muted); }

  .product-name { font-size:14px; font-weight:500; margin-bottom:3px; }
  .product-meta { font-size:12px; color:var(--text-muted); margin-bottom:6px; }
  .product-price { font-size:13px; margin-bottom:6px; }
  .product-price .old { text-decoration:line-through; color:var(--text-muted); margin-right:6px; }
  .product-price .current { color:var(--green); font-weight:600; }

  .product-categories { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
  .product-cat-tag { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:4px; font-size:11px; background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
  .product-cat-tag .remove { cursor:pointer; opacity:.5; font-size:13px; line-height:1; }
  .product-cat-tag .remove:hover { opacity:1; color:var(--red); }

  .no-category { border-left:3px solid var(--orange); }
  .has-category { border-left:3px solid var(--green); }

  /* Params */
  .params-table { width:100%; font-size:11px; border-collapse:collapse; margin-top:6px; }
  .params-table td { padding:3px 6px; border-bottom:1px solid var(--border); vertical-align:top; }
  .params-table td:first-child { color:var(--text-muted); white-space:nowrap; width:90px; }
  .param-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; margin:1px 2px; background:var(--surface2); border:1px solid var(--border); }
  .param-color { display:inline-flex; align-items:center; gap:4px; padding:1px 6px; border-radius:3px; font-size:10px; margin:1px 2px; background:var(--surface2); border:1px solid var(--border); }
  .color-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

  /* SEO name row */
  .seo-row { margin-top:5px; padding:4px 8px; border-radius:4px; font-size:12px; display:flex; align-items:center; gap:6px; }
  .seo-shopify { background:rgba(108,140,255,.08); color:var(--accent); }
  .seo-title { background:rgba(78,205,196,.08); color:var(--accent2); }
  .seo-llm { background:rgba(167,139,250,.08); color:var(--purple); }
  .seo-row .label { color:var(--text-muted); font-size:11px; min-width:70px; }
  .seo-row input { background:transparent; border:none; color:inherit; font-size:12px; flex:1; outline:none; font-family:inherit; }
  .seo-row input:focus { border-bottom:1px solid currentColor; }

  /* Popup */
  .assign-popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; z-index:200; width:440px; max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .assign-popup.show { display:block; }
  .assign-popup h3 { font-size:15px; margin-bottom:12px; }
  .cat-checkbox { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:6px; cursor:pointer; font-size:13px; transition:background .15s; }
  .cat-checkbox:hover { background:var(--surface2); }
  .cat-checkbox input { accent-color:var(--accent); }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:150; }
  .overlay.show { display:block; }

  /* Info panels */
  .info-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:16px; }
  .info-panel h3 { font-size:14px; margin-bottom:8px; }
  .info-panel ul { font-size:12px; color:var(--text-muted); padding-left:18px; }
  .info-panel li { margin-bottom:4px; }
  .info-panel code { background:var(--surface2); padding:1px 5px; border-radius:3px; font-size:11px; }
  .info-panel .example { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px; margin-top:8px; font-size:12px; }
  .info-panel .good { color:var(--green); }
  .info-panel .bad { color:var(--red); }
  .ref-cats { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
  .ref-cat { padding:3px 9px; border-radius:4px; font-size:12px; background:rgba(78,205,196,.1); color:var(--accent2); border:1px solid rgba(78,205,196,.2); }

  .filter-schema-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; margin-top:10px; }
  .filter-card { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:10px; }
  .filter-card h4 { font-size:13px; margin-bottom:4px; }
  .shopify-key { font-size:10px; color:var(--text-muted); font-weight:400; }
  .fv { padding:2px 8px; border-radius:3px; font-size:11px; background:var(--bg); color:var(--text-muted); border:1px solid var(--border); display:inline-block; margin:2px; }

  .export-area { display:none; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-top:16px; }
  .export-area.show { display:block; }
  .export-area textarea { width:100%; min-height:300px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:12px; font-family:monospace; font-size:12px; resize:vertical; }

  .collapsible-toggle { cursor:pointer; user-select:none; display:flex; align-items:center; gap:6px; }
  .collapsible-toggle .arrow { transition:transform .2s; font-size:10px; }
  .collapsible-toggle.open .arrow { transform:rotate(90deg); }
  .collapsible-body { display:none; }
  .collapsible-body.open { display:block; }

  @media (max-width:768px) { .layout { grid-template-columns:1fr; } .sidebar { max-height:300px; } }
</style>
</head>
<body>

<header>
  <h1>Royal Bay <span>Shopify Planner</span></h1>
  <div class="header-actions">
    <button onclick="resetAll()">Reset</button>
    <button class="primary" onclick="exportJSON()">Export JSON</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportMarkdown()">Export MD</button>
    <button onclick="downloadAll()" style="background:var(--green);border-color:var(--green);color:#000;font-weight:600">Download All</button>
  </div>
</header>

<div class="stats-bar">
  <span><b id="stat-total">0</b> products</span>
  <span><b id="stat-assigned">0</b> assigned</span>
  <span><b id="stat-unassigned">0</b> unassigned</span>
  <span><b id="stat-variants">0</b> color variants</span>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>Shopify Collections</h2>
    <div id="category-tree"></div>
    <div class="drop-zone" id="drop-zone">Drop here = unassign all</div>
  </div>

  <div class="main">
    <div class="tabs" id="tabs-bar">
      <div class="tab active" data-tab="all">All Products</div>
      <div class="tab" data-tab="unassigned">Unassigned</div>
      <div class="tab" data-tab="tree">Category Tree</div>
      <div class="tab" data-tab="variants">Variant Strategy</div>
      <div class="tab" data-tab="filters">Filter Preview</div>
      <div class="tab" data-tab="shopify-setup">Shopify Setup</div>
      <div class="tab" data-tab="seo">SEO & LLM Guide</div>
    </div>

    <div class="view-controls" id="view-controls">
      <input type="text" class="search-box" placeholder="Search products..." id="search-input">
      <button class="filter-btn active" data-line="all">All</button>
      <button class="filter-btn" data-line="energy">Energy</button>
      <button class="filter-btn" data-line="air">Air</button>
      <button class="filter-btn" data-line="extreme">Extreme</button>
      <button class="filter-btn" data-line="therapy">Therapy</button>
      <button class="filter-btn" data-line="motion">Motion</button>
      <button class="filter-btn" data-line="merino">Merino</button>
      <button class="filter-btn" data-line="nrg">NRG</button>
      <button class="filter-btn" data-line="ortho">Ortho</button>
    </div>

    <div class="product-grid" id="product-grid"></div>
    <div id="tree-view" style="display:none"></div>
    <div id="filter-preview" style="display:none"></div>
    <div id="seo-guide" style="display:none"></div>
    <div id="shopify-setup-view" style="display:none"></div>
    <div id="variants-view" style="display:none"></div>
    <div class="export-area" id="export-area">
      <h3 style="margin-bottom:8px">Export</h3>
      <textarea id="export-output" readonly></textarea>
    </div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="assign-popup" id="assign-popup">
  <h3 id="popup-title">Assign Categories</h3>
  <div id="popup-categories"></div>
  <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
    <button class="filter-btn" id="popup-close">Done</button>
  </div>
</div>

// STATE
// ============================================================
let currentTab = 'all';
let currentLineFilter = 'all';
let currentCategoryFilter = null;

function loadState() {
  const saved = localStorage.getItem('rb-planner-v3');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      data.forEach(s => {
        const p = PRODUCTS.find(x => x.id === s.id);
        if (p) {
          if (s.categories && s.categories.length) p.categories = s.categories;
          if (s.shopifyName) p.shopifyName = s.shopifyName;
          if (s.seoTitle) p.seoTitle = s.seoTitle;
          if (s.llmDesc) p.llmDesc = s.llmDesc;
        }
      });
    } catch(e) {}
  }
}
function saveState() {
  localStorage.setItem('rb-planner-v3', JSON.stringify(
    PRODUCTS.map(p => ({ id:p.id, categories:p.categories, shopifyName:p.shopifyName, seoTitle:p.seoTitle, llmDesc:p.llmDesc }))
  ));
}

function getLineClass(l) { return { energy:'line-energy',air:'line-air',extreme:'line-extreme','extreme-race':'line-extreme-race',therapy:'line-therapy','therapy-premium':'line-therapy-premium',relax:'line-relax',motion:'line-motion',merino:'line-merino',nrg:'line-nrg',ortho:'line-ortho',accessories:'line-accessories' }[l]||'line-accessories'; }
function getLineName(l) { return { energy:'Energy',air:'Air',extreme:'Extreme','extreme-race':'Extreme Race',therapy:'Therapy','therapy-premium':'Therapy Premium',relax:'Relax',motion:'Motion',merino:'Merino',nrg:'NRG',ortho:'Ortho',accessories:'Accessories' }[l]||l; }
function getCatName(id) { for(const g of Object.values(CATEGORIES)) { const c=g.items.find(x=>x.id===id); if(c) return c.name; } return id; }
function getCat(id) { for(const g of Object.values(CATEGORIES)) { const c=g.items.find(x=>x.id===id); if(c) return c; } return null; }

function renderCategoryTree() {
  const el = document.getElementById('category-tree');
  let h = '';
  for (const [k,g] of Object.entries(CATEGORIES)) {
    h += `<div class="cat-group"><div class="cat-group-title">${g.label}</div>`;
    for (const c of g.items) {
      const n = PRODUCTS.filter(p => p.categories.includes(c.id)).length;
      const act = currentCategoryFilter === c.id;
      h += `<div class="cat-item${act?' active':''}" data-cat="${c.id}">
        <span><span class="cat-icon">${c.id==='podkolenky'?'🧦':c.id==='lytkove-navleky'?'🦵':c.id==='stehenni-navleky'?'🦿':c.id==='pazni-navleky'?'💪':c.id==='sortky'?'🩳':c.id==='ponozky'?'🧦':c.id==='bandaze'?'🩹':c.id==='doplnky'?'🎽':c.id==='beh'?'🏃':c.id==='cyklistika'?'🚴':c.id==='trail'?'🥾':c.id==='fitness'?'🏋️':c.id==='lyzovani'?'⛷️':c.id==='cestovani'?'✈️':c.id==='kazdodenni'?'👟':c.id==='sport'?'⚡':c.id==='medical'?'🏥':c.id==='regenerace'?'🔄':c.id==='prevence'?'🛡️':c.id==='baleni'?'📦':c.id==='outlet'?'🏷️':c.id==='na-miru'?'✂️':'📁'}</span>${c.name}</span>
        <span class="count">${n}</span>
      </div>`;
      if (act) {
        h += `<div class="cat-seo" style="display:block">
          <div style="font-size:10px;color:var(--accent2)">SEO Title: ${c.seoTitle||''}</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${c.handle}</div>
        </div>`;
      }
    }
    h += `</div>`;
  }
  el.innerHTML = h;
}

function renderParamsHtml(p) {
  if (!p.params) return '';
  const pr = p.params; let r = '';
  if (pr.compression_type) r+=`<tr><td>Komprese</td><td><span class="param-tag">${pr.compression_type}</span></td></tr>`;
  if (pr.compression_class) r+=`<tr><td>Trida</td><td><span class="param-tag">${pr.compression_class}</span></td></tr>`;
  if (pr.material) r+=`<tr><td>Material</td><td><span class="param-tag">${pr.material}</span></td></tr>`;
  if (pr.sock_height) r+=`<tr><td>Vyska</td><td><span class="param-tag">${pr.sock_height}</span></td></tr>`;
  if (pr.colors?.length) r+=`<tr><td>Barvy</td><td>${pr.colors.map(c=>`<span class="param-color"><span class="color-dot" style="background:${COLOR_MAP[c]||'#888'}"></span>${c}</span>`).join('')}</td></tr>`;
  if (pr.sizes?.length) r+=`<tr><td>Velikosti</td><td>${pr.sizes.map(s=>`<span class="param-tag">${s}</span>`).join('')}</td></tr>`;
  if (pr.activities?.length) r+=`<tr><td>Aktivity</td><td>${pr.activities.map(a=>`<span class="param-tag">${a}</span>`).join('')}</td></tr>`;
  if (pr.use_case?.length) r+=`<tr><td>Pouziti</td><td>${pr.use_case.map(u=>`<span class="param-tag">${u}</span>`).join('')}</td></tr>`;
  if (pr.medical_indication?.length) r+=`<tr><td>Indikace</td><td>${pr.medical_indication.map(m=>`<span class="param-tag">${m}</span>`).join('')}</td></tr>`;
  if (pr.features?.length) r+=`<tr><td>Vlastnosti</td><td>${pr.features.map(f=>`<span class="param-tag">${f}</span>`).join('')}</td></tr>`;
  return r ? `<table class="params-table">${r}</table>` : '';
}

function renderProducts() {
  const el = document.getElementById('product-grid');
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = PRODUCTS.filter(p => {
    if (currentTab==='unassigned' && p.categories.length>0) return false;
    if (currentLineFilter!=='all' && p.line!==currentLineFilter) return false;
    if (currentCategoryFilter && !p.categories.includes(currentCategoryFilter)) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.shopifyName.toLowerCase().includes(q)) return false;
    return true;
  });
  let h = '';
  filtered.forEach(p => {
    h += `<div class="product-card ${p.categories.length?'has-category':'no-category'}" draggable="true" data-id="${p.id}">
      <div>
        <span class="product-line ${getLineClass(p.line)}">${getLineName(p.line)}</span>
        ${p.isOutlet?'<span class="product-line line-accessories">Outlet</span>':''}
        ${p.isCustom?'<span class="product-line line-accessories">Custom</span>':''}
      </div>
      <div class="product-name">${p.name}</div>
      <div class="product-price">
        ${p.priceOld?`<span class="old">${p.priceOld} Kc</span>`:''}
        <span class="current">${p.price} Kc</span>
      </div>
      <div class="seo-row seo-shopify">
        <span class="label">Shopify:</span>
        <input type="text" value="${p.shopifyName}" data-field="shopifyName" data-pid="${p.id}">
      </div>
      <div class="seo-row seo-title">
        <span class="label">SEO Title:</span>
        <input type="text" value="${p.seoTitle}" data-field="seoTitle" data-pid="${p.id}">
      </div>
      <div class="seo-row seo-llm">
        <span class="label">LLM Desc:</span>
        <input type="text" value="${p.llmDesc}" data-field="llmDesc" data-pid="${p.id}">
      </div>
      <div class="product-categories">
        ${p.categories.map(c=>`<span class="product-cat-tag">${getCatName(c)} <span class="remove" data-pid="${p.id}" data-cat="${c}">&times;</span></span>`).join('')}
        <span class="product-cat-tag" style="cursor:pointer;color:var(--accent);border-color:var(--accent)" data-assign="${p.id}">+</span>
      </div>
      ${renderParamsHtml(p)}
    </div>`;
  });
  el.innerHTML = h || '<div style="color:var(--text-muted);padding:40px;text-align:center">No products match</div>';
  updateStats();
}

function renderFilterPreview() {
  const el = document.getElementById('filter-preview');
  let h = '<h3 style="margin-bottom:12px">Shopify Filter Schema (Metafields)</h3>';
  h += '<div class="filter-schema-grid">';
  FILTER_SCHEMA.forEach(f => {
    h += `<div class="filter-card"><h4>${f.label} <span class="shopify-key">${f.shopify}</span></h4>
      <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Type: ${f.type}</div>
      <div>${f.values.map(v=>`<span class="fv">${v}</span>`).join('')}</div></div>`;
  });
  h += '</div>';
  h += '<h3 style="margin:20px 0 12px">Per-Category Filter Aggregation</h3>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:12px">';
  for (const c of CATEGORIES.byType.items) {
    const ps = PRODUCTS.filter(p => p.categories.includes(c.id) && !p.isBundle);
    if (!ps.length) continue;
    const agg = {};
    FILTER_SCHEMA.forEach(f => { agg[f.key] = new Set(); });
    ps.forEach(p => { if(!p.params) return; const pr=p.params;
      if(pr.compression_type) agg.compression_type.add(pr.compression_type);
      if(pr.compression_class) agg.compression_class.add(pr.compression_class);
      if(pr.material) agg.material.add(pr.material);
      if(pr.gender) agg.gender.add(pr.gender);
      if(pr.sock_height) agg.sock_height.add(pr.sock_height);
      (pr.colors||[]).forEach(x=>agg.color.add(x));
      (pr.sizes||[]).forEach(x=>agg.size.add(x));
      (pr.activities||[]).forEach(x=>agg.activity.add(x));
      (pr.use_case||[]).forEach(x=>agg.use_case.add(x));
      (pr.medical_indication||[]).forEach(x=>agg.medical_indication.add(x));
      (pr.features||[]).forEach(x=>agg.features.add(x));
      agg.product_line.add(getLineName(p.line));
    });
    h += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">${c.name} (${ps.length})</div>`;
    FILTER_SCHEMA.forEach(f => {
      const v = agg[f.key]; if(!v||v.size===0) return;
      if(v.size<=1 && !['size','color'].includes(f.key)) return;
      h += `<div style="margin-bottom:6px"><div style="font-size:12px;font-weight:500;margin-bottom:2px">${f.label}</div>
        <div>${[...v].map(x => f.key==='color'?`<span class="param-color"><span class="color-dot" style="background:${COLOR_MAP[x]||'#888'}"></span>${x}</span>`:`<span class="param-tag">${x}</span>`).join('')}</div></div>`;
    });
    h += `</div>`;
  }
  h += '</div>';
  el.innerHTML = h;
}

function updateStats() {
  const t=PRODUCTS.length, a=PRODUCTS.filter(p=>p.categories.length>0).length;
  let totalColors=0; PRODUCTS.forEach(p=>{if(p.params?.colors) totalColors+=p.params.colors.length;});
  document.getElementById('stat-total').textContent=t;
  document.getElementById('stat-assigned').textContent=a;
  document.getElementById('stat-unassigned').textContent=t-a;
  document.getElementById('stat-variants').textContent=totalColors;
}

function renderAll() { renderCategoryTree(); showCurrentView(); }

function showCurrentView() {
  const grid=document.getElementById('product-grid'), tree=document.getElementById('tree-view'),
    fp=document.getElementById('filter-preview'), seo=document.getElementById('seo-guide'),
    vc=document.getElementById('view-controls');
  const vv=document.getElementById('variants-view');
  const ss = document.getElementById('shopify-setup-view');
  grid.style.display='none'; tree.style.display='none'; fp.style.display='none'; seo.style.display='none'; vv.style.display='none'; ss.style.display='none';
  vc.style.display = ['all','unassigned'].includes(currentTab) ? 'flex' : 'none';
  document.getElementById('export-area').classList.remove('show');

  if (currentTab==='tree') { tree.style.display='block'; renderTreeView(); }
  else if (currentTab==='filters') { fp.style.display='block'; renderFilterPreview(); }
  else if (currentTab==='seo') { seo.style.display='block'; renderSeoGuide(); }
  else if (currentTab==='shopify-setup') { ss.style.display='block'; renderShopifySetup(); }
  else if (currentTab==='variants') { vv.style.display='block'; renderVariantsView(); }
  else { grid.style.display='grid'; renderProducts(); }
}

// ============================================================
// EVENT DELEGATION (fixes click bugs)
// ============================================================
// Tab clicks
document.getElementById('tabs-bar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  currentTab = tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  showCurrentView();
});

// Line filter clicks
document.getElementById('view-controls').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn || !btn.dataset.line) return;
  currentLineFilter = btn.dataset.line;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
});

// Search
document.getElementById('search-input').addEventListener('input', () => renderProducts());

// Category sidebar clicks
document.getElementById('category-tree').addEventListener('click', e => {
  const item = e.target.closest('.cat-item');
  if (!item) return;
  const catId = item.dataset.cat;
  currentCategoryFilter = currentCategoryFilter === catId ? null : catId;
  // Switch to product view so filter is visible
  if (currentCategoryFilter && !['all','unassigned','bundles'].includes(currentTab)) {
    currentTab = 'all';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('.tab[data-tab="all"]').classList.add('active');
  }
  renderAll();
});

// Category sidebar drag-drop
document.getElementById('category-tree').addEventListener('dragover', e => {
  const item = e.target.closest('.cat-item');
  if (item) { e.preventDefault(); item.classList.add('active'); }
});
document.getElementById('category-tree').addEventListener('dragleave', e => {
  const item = e.target.closest('.cat-item');
  if (item && currentCategoryFilter !== item.dataset.cat) item.classList.remove('active');
});
document.getElementById('category-tree').addEventListener('drop', e => {
  const item = e.target.closest('.cat-item');
  if (!item || !draggedPid) return;
  e.preventDefault();
  if (currentCategoryFilter !== item.dataset.cat) item.classList.remove('active');
  const p = PRODUCTS.find(x=>x.id===draggedPid);
  if (p && !p.categories.includes(item.dataset.cat)) { p.categories.push(item.dataset.cat); saveState(); renderAll(); }
});

// Product grid events (delegation)
let draggedPid = null;
document.getElementById('product-grid').addEventListener('dragstart', e => {
  const card = e.target.closest('.product-card');
  if (card) { draggedPid = +card.dataset.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed='copy'; }
});
document.getElementById('product-grid').addEventListener('dragend', e => {
  const card = e.target.closest('.product-card');
  if (card) { card.classList.remove('dragging'); draggedPid=null; }
});
document.getElementById('product-grid').addEventListener('click', e => {
  // Remove category tag
  const rm = e.target.closest('.remove');
  if (rm) { const p=PRODUCTS.find(x=>x.id===+rm.dataset.pid); if(p){p.categories=p.categories.filter(c=>c!==rm.dataset.cat);saveState();renderAll();} return; }
  // Assign popup
  const assign = e.target.closest('[data-assign]');
  if (assign) { openAssignPopup(+assign.dataset.assign); return; }
});
document.getElementById('product-grid').addEventListener('change', e => {
  const inp = e.target.closest('input[data-field]');
  if (inp) { const p=PRODUCTS.find(x=>x.id===+inp.dataset.pid); if(p){p[inp.dataset.field]=inp.value;saveState();} }
});
document.getElementById('product-grid').addEventListener('dblclick', e => {
  const card = e.target.closest('.product-card');
  if (card && !e.target.closest('input')) openAssignPopup(+card.dataset.id);
});

// Drop zone
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  if (draggedPid) { const p=PRODUCTS.find(x=>x.id===draggedPid); if(p){p.categories=[];saveState();renderAll();} }
});

// Popup
function openAssignPopup(pid) {
  const p = PRODUCTS.find(x=>x.id===pid);
  if (!p) return;
  document.getElementById('popup-title').textContent = p.shopifyName;
  let h = '';
  for (const [k,g] of Object.entries(CATEGORIES)) {
    h += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin:10px 0 4px;padding-top:8px;border-top:1px solid var(--border)">${g.label}</div>`;
    for (const c of g.items) {
      const ch = p.categories.includes(c.id) ? 'checked' : '';
      h += `<label class="cat-checkbox"><input type="checkbox" ${ch} data-pid="${pid}" data-cat="${c.id}"> ${c.name}</label>`;
    }
  }
  document.getElementById('popup-categories').innerHTML = h;
  document.getElementById('assign-popup').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}
function closePopup() {
  document.getElementById('assign-popup').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', closePopup);
document.getElementById('popup-close').addEventListener('click', closePopup);
document.getElementById('popup-categories').addEventListener('change', e => {
  const cb = e.target;
  if (cb.type !== 'checkbox') return;
  const p = PRODUCTS.find(x=>x.id===+cb.dataset.pid);
  if (!p) return;
  if (cb.checked && !p.categories.includes(cb.dataset.cat)) p.categories.push(cb.dataset.cat);
  else if (!cb.checked) p.categories = p.categories.filter(c=>c!==cb.dataset.cat);
  saveState(); renderAll();
});

  document.getElementById('export-output').value = md;
  document.getElementById('export-area').classList.add('show');
  navigator.clipboard.writeText(md).catch(()=>{});
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function downloadAll() {
  // JSON
  const jsonData = { exportDate:new Date().toISOString(), filterSchema:FILTER_SCHEMA, categories:CATEGORIES,
    products: PRODUCTS.map(p=>({ id:p.id, originalName:p.name, shopifyName:p.shopifyName,
      seoTitle:p.seoTitle, llmDescription:p.llmDesc, line:p.line, type:p.type,
      price:p.price, priceOriginal:p.priceOld, isOutlet:p.isOutlet, isCustom:p.isCustom||false,
      collections:p.categories, collectionNames:p.categories.map(getCatName), params:p.params }))
  };
  downloadFile(JSON.stringify(jsonData,null,2), 'royalbay-shopify-catalog.json', 'application/json');

  // CSV
  let csv = 'ID,Original,Shopify Name,SEO Title,LLM Description,Line,Type,Price,Collections,Compression,Material,Colors,Sizes,Activities\n';
  PRODUCTS.forEach(p => { const pr=p.params||{};
    csv += [p.id,`"${p.name}"`,`"${p.shopifyName}"`,`"${p.seoTitle}"`,`"${p.llmDesc}"`,p.line,p.type,p.price,
      `"${p.categories.map(getCatName).join('; ')}"`,`"${pr.compression_type||''}"`,`"${pr.material||''}"`,
      `"${(pr.colors||[]).join(', ')}"`,`"${(pr.sizes||[]).join(', ')}"`,`"${(pr.activities||[]).join(', ')}"`
    ].join(',')+'\n';
  });
  downloadFile(csv, 'royalbay-shopify-products.csv', 'text/csv');

  // Markdown — reuse logic
  exportMarkdown();
  const md = document.getElementById('export-output').value;
  downloadFile(md, 'royalbay-shopify-catalog.md', 'text/markdown');

  document.getElementById('export-area').classList.remove('show');
  alert('Stiahnuté 3 súbory: JSON, CSV, Markdown');
}

function resetAll() {
  if (!confirm('Reset all to defaults?')) return;
  localStorage.removeItem('rb-planner-v3');
  location.reload();
}

function renderShopifySetup() {
  const el = document.getElementById('shopify-setup-view');

  // Build filter aggregation per product-type category
  function getFiltersForCategory(catId) {
    const ps = PRODUCTS.filter(p => p.categories.includes(catId));
    if (!ps.length) return null;
    const agg = { colors: new Set(), sizes: new Set(), compression_type: new Set(), compression_class: new Set(),
      activities: new Set(), material: new Set(), features: new Set(), sock_height: new Set(), product_line: new Set() };
    ps.forEach(p => {
      if (!p.params) return;
      const pr = p.params;
      agg.product_line.add(getLineName(p.line));
      if (pr.compression_type) agg.compression_type.add(pr.compression_type);
      if (pr.compression_class) agg.compression_class.add(pr.compression_class);
      if (pr.material) agg.material.add(pr.material);
      if (pr.sock_height) agg.sock_height.add(pr.sock_height);
      (pr.colors||[]).forEach(c => agg.colors.add(c));
      (pr.sizes||[]).forEach(s => agg.sizes.add(s));
      (pr.activities||[]).forEach(a => agg.activities.add(a));

        </div>

        <!-- Category title -->
        <div style="padding:0 16px 8px">
          <h2 id="eshop-h1" style="font-size:20px;font-weight:700;margin-bottom:2px">${firstCat.seoH1 || firstCat.name}</h2>
          <div id="eshop-handle" style="font-size:11px;color:var(--accent2)">${firstCat.handle}</div>
          <div id="eshop-count" style="font-size:12px;color:var(--text-muted);margin-top:4px">${firstPreview.count} produktov</div>
        </div>

        <!-- Category tabs -->
        <div style="padding:4px 16px 10px;display:flex;gap:6px;flex-wrap:wrap" id="shopify-cat-tabs">
          ${catTabsHtml}
        </div>

        <!-- E-shop layout: sidebar + grid -->
        <div style="display:grid;grid-template-columns:220px 1fr;border-top:1px solid var(--border)">
          <!-- Filter sidebar -->
          <div id="eshop-sidebar" style="border-right:1px solid var(--border);padding:14px;overflow-y:auto;max-height:600px">
            <div style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
              Filtre
              <span style="font-size:10px;color:var(--accent);cursor:pointer;font-weight:400">Zrusit vsetky</span>
            </div>
            ${firstPreview.sidebar}
          </div>

          <!-- Product grid -->
          <div id="eshop-grid" style="padding:14px;overflow-y:auto;max-height:600px">
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
              ${firstPreview.cards}
            </div>
          </div>
        </div>
      </div>

      <!-- Bundles & Upsell -->
      <div class="info-panel" style="margin-top:12px;border-color:var(--yellow)">
        <h3 style="color:var(--yellow);margin-bottom:10px">Bundles & Upsell — Bez samostatnych produktov</h3>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">
          Bundly (vyhodna baleni, sety) sa <b>nevytvaraju ako samostatne produkty</b> v katalógu.
          Riesenie cez nativne Shopify nastroje:
        </p>

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:14px">
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px">
            <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--green)">1. Shopify Bundles App</div>
            <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
              Nativna app od Shopify (zadarmo). Vytvoris bundle v admin — vyberies produkty, nastavis zľavu.
              Inventory sa automaticky odpočítava z jednotlivych poloziek.
            </div>
            <div style="margin-top:8px;padding:8px;background:var(--bg);border-radius:6px;font-size:11px">
              <div style="color:var(--text-muted)">Priklad:</div>
              <div style="margin-top:4px"><b>Podkolenky Energy + Ponozky NRG</b></div>
              <div style="color:var(--green)">Uspora 10% pri kúpe spolu</div>
            </div>
          </div>

          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px">
            <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--accent)">2. Automatic Discounts</div>
            <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
              Shopify Discounts → Automatic. Pravidla ako "Kúp 2+, ušetri 15%".
              Aplikuje sa automaticky v košíku bez kupónu.
            </div>
            <div style="margin-top:8px;padding:8px;background:var(--bg);border-radius:6px;font-size:11px">
              <div style="color:var(--text-muted)">Priklad pravidiel:</div>
              <div style="margin-top:4px">• 2 pary podkolienok = <b>-10%</b></div>
              <div>• 3+ produkty z kolekcie = <b>-15%</b></div>
              <div>• Podkolenky + navleky = <b>-12%</b></div>
            </div>
          </div>

          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px">
            <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--purple)">3. Cross-sell na Product Page</div>
            <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
              Theme blok "Kupte spolu a usetrite" pod produktom. Zakaznik vidi doplnkove produkty s bundle zlavou.
              Klik = pridanie oboch do kosika.
            </div>
            <div style="margin-top:8px;padding:8px;background:var(--bg);border-radius:6px;font-size:11px">
              <div style="color:var(--text-muted)">Navrhnuté kombinácie:</div>
              <div style="margin-top:4px">• Podkolenky → ponozky rovnakej rady</div>
              <div>• Lytkove navleky → ponozky</div>
              <div>• Therapy → Ortho bandaz</div>
            </div>
          </div>
        </div>

        <div style="font-size:12px;padding:10px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:6px;color:var(--text-muted)">
          <b style="color:var(--yellow)">Pre Mime Digital:</b> Implementovat "Frequently Bought Together" blok na product page.
          Bundle pravidla sa nastavia v Shopify Admin → Discounts. Žiadne bundle produkty v katalógu — len zľavové pravidlá a cross-sell UI.
        </div>
      </div>

      <!-- Implementation notes below the preview -->
      <div class="info-panel" style="margin-top:12px;border-color:var(--purple)">
        <h3 style="color:var(--purple);margin-bottom:8px">Implementacia pre Mime Digital</h3>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.8">
          <b>1. Shopify Admin → Settings → Custom data → Products:</b><br>
          &nbsp;&nbsp;Vytvorit metafields: <code>custom.compression_type</code>, <code>custom.compression_class</code>, <code>custom.activity</code>, <code>custom.use_case</code>, <code>custom.material</code>, <code>custom.features</code>, <code>custom.sock_height</code>, <code>custom.product_line</code>, <code>custom.llm_description</code><br><br>

          <b>2. Shopify Admin → Online Store → Navigation → Collection filters:</b><br>
          &nbsp;&nbsp;Pridat filtre: Barva (option.color), Velikost (option.size) + vsetky custom.* metafields<br><br>

          <b>3. Theme — Collection page sidebar:</b><br>
          &nbsp;&nbsp;Filtre sa zobrazuju presne ako v preview hore. Kazdy filter = 1 Shopify metafield. Barvy ako swatche, velkosti ako buttony, ostatne ako checkboxy.<br><br>

          <b>4. Data import:</b><br>
          &nbsp;&nbsp;Pouzit export z tohto planneru (JSON/CSV/MD) pre hromadny import cez Shopify Matrixify alebo Stock Sync app.
          Stiahnite vsetky formáty cez tlacidlo <b>"Download All"</b> v headeri.
        </div>
      </div>
    </div>
  </div>`;

  // Wire up category tab switching
  document.getElementById('shopify-cat-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.shopify-cat-tab');
    if (!tab) return;
    const catId = tab.dataset.previewCat;
    const cat = getCat(catId);
    if (!cat) return;

    // Update active tab
    document.querySelectorAll('.shopify-cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    // Rebuild preview
    const preview = buildEshopPreview(cat);
    document.getElementById('eshop-sidebar').innerHTML = `
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        Filtre
        <span style="font-size:10px;color:var(--accent);cursor:pointer;font-weight:400">Zrusit vsetky</span>
      </div>
      ${preview.sidebar}`;
    document.getElementById('eshop-grid').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
        ${preview.cards}
      </div>`;
    document.getElementById('eshop-breadcrumb').textContent = cat.name;
    document.getElementById('eshop-h1').textContent = cat.seoH1 || cat.name;
    document.getElementById('eshop-handle').textContent = cat.handle;
    document.getElementById('eshop-count').textContent = preview.count + ' produktov';
  });
}

// ============================================================
// VARIANT DISPLAY STRATEGY
// ============================================================
function renderVariantsView() {
  const el = document.getElementById('variants-view');

  // Calculate stats
  let totalProducts = PRODUCTS.length;
  let totalColors = 0;
  let maxColors = 0;
  let maxProduct = '';
  PRODUCTS.forEach(p => {
    const nc = p.params?.colors?.length || 0;
    totalColors += nc;
    if (nc > maxColors) { maxColors = nc; maxProduct = p.shopifyName; }
  });

  el.innerHTML = `
  <div class="info-panel" style="border-color:var(--accent)">
    <h3 style="color:var(--accent)">Variant Display Strategy — Jak zobrazit farebne varianty na kategorii</h3>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">
      Royal Bay ma <b>${totalProducts} produktov</b> s celkovo <b>${totalColors} farebnymi variantami</b>.
      Produkt s najviac variantami: <b>${maxProduct}</b> (${maxColors} farieb).
    </p>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:20px">
      <div style="background:var(--surface2);border:2px solid var(--green);border-radius:8px;padding:14px">
        <h4 style="color:var(--green);margin-bottom:6px">DOPORUCENIE: Master + Color Swatches</h4>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
          <b>1 karta = 1 produkt</b>, farebne varianty ako male bodky/swatche pod obrazkom.<br><br>
          <b>Preco toto:</b>
          <ul style="margin-top:4px">
            <li>28 produktov = prehladna kategoria</li>
            <li>Zakaznik vidi vsetky farby na prvsi pohlad</li>
            <li>Shopify nativne podporuje (variant options)</li>
            <li>Lepsia konverzia — menej scrollovania</li>
            <li>SEO: 1 URL na produkt = silnejsia autorita</li>
          </ul>
        </div>
      </div>

      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px">
        <h4 style="color:var(--orange);margin-bottom:6px">ALTERNATIVA: Separate Cards per Color</h4>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
          <b>Kazda farba = samostatna karta</b> (STOX Energy pristup na vacsich kolekciach).<br><br>
          <b>Kedy pouzit:</b>
          <ul style="margin-top:4px">
            <li>Ked farby maju rozne vzory/designy (nie len plain color)</li>
            <li>Pre kolekcie kde chcete vizualne zaplnit grid</li>
            <li>${totalColors} kariet namiesto ${totalProducts} — moze byt prilis</li>
          </ul>
          <b style="color:var(--red)">Nevyhoda:</b> duplicitny obsah, horsie SEO, neprehladnost
        </div>
      </div>

      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px">
        <h4 style="color:var(--purple);margin-bottom:6px">HYBRID: Master + Hover Preview</h4>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
          <b>1 karta, ale pri hoveri sa meni hlavny obrazok</b> podla farby nad ktorou je mys.<br><br>
          <b>Ako STOX na running page:</b>
          <ul style="margin-top:4px">
            <li>Thumbnaily farieb pod hlavnym obrazkom</li>
            <li>Hover nad thumbnailom zmeni velky obrazok</li>
            <li>Klik na thumbnail = presmerovanie na product page s predvybranou farbou</li>
          </ul>
          <b style="color:var(--green)">Toto je best practice pre Shopify.</b>
        </div>
      </div>
    </div>
  </div>

  <div class="info-panel">
    <h3>Shopify implementacia — Color Swatches na kategoriach</h3>
    <div style="font-size:12px;color:var(--text-muted);line-height:1.7;margin-top:8px">
      <b>1. Variant option "Color"</b> — kazdy produkt ma varianty: Color + Size<br>
      <b>2. Shopify theme</b> — vacsina themes (Dawn, Prestige, Impulse) podporuje swatche natívne<br>
      <b>3. Na collection page:</b> zobrazit color dots pod product image<br>
      <b>4. Na hover:</b> zmenit product image na image danej farby<br>
      <b>5. Na klik:</b> ist na product page s ?variant=COLOR predvolbou<br><br>
      <b>Mime Digital implementacia:</b> Povedzte im ze chcete "collection page color swatches with image swap on hover".
      Je to standardna funkcia v premium themes alebo jednoduchy custom code.
    </div>
  </div>

  <div class="info-panel">
    <h3>Preview — Kolko farieb ma kazdy produkt</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:8px;margin-top:10px">
    ${PRODUCTS.map(p => {
      const colors = p.params?.colors || [];
      const colorDots = colors.map(c => `<span class="param-color"><span class="color-dot" style="background:${COLOR_MAP[c]||'#888'}"></span>${c}</span>`).join('');
      return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;display:flex;align-items:center;gap:8px">
        <span class="product-line ${getLineClass(p.line)}" style="font-size:10px;min-width:70px">${getLineName(p.line)}</span>
        <span style="font-size:11px;flex:1">${p.shopifyName.split('|')[1]||p.shopifyName}</span>
        <span style="font-size:11px;color:var(--accent);font-weight:600;min-width:20px">${colors.length}</span>
        <span style="display:flex;flex-wrap:wrap;gap:2px">${colorDots}</span>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

loadState();
renderAll();
</script>
